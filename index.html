*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  width: 100%;
  height: 100%;
  height: -webkit-fill-available;
}
body {
  width: 100%;
  height: 100%;
  min-height: -webkit-fill-available;
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: max(1.5rem, env(safe-area-inset-top)) 1.25rem max(1.5rem, env(safe-area-inset-bottom));
  overflow: hidden;
}

.scene {
  width: 100%;
  max-width: var(--card-width, 340px);
  display: flex;
  flex-direction: column;
  align-items: center;
}

.topbar {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.4rem;
  opacity: 0;
  transform: translateY(-8px);
  transition: opacity 0.4s ease 0.5s, transform 0.4s ease 0.5s;
  pointer-events: none;
}
.topbar.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.site-name {
  letter-spacing: 0.04em;
  text-align: left;
}

.top-date {
  opacity: 0.75;
  letter-spacing: 0.06em;
  text-align: right;
}

.swap {
  position: relative;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.anim-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.4rem;
  transition: opacity 0.35s ease, transform 0.35s ease;
  position: absolute;
}
.anim-stage.out {
  opacity: 0;
  transform: scale(0.88);
  pointer-events: none;
}

.pokeball {
  width: var(--ball-size, 140px);
  height: var(--ball-size, 140px);
  border-radius: 50%;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  border: var(--ball-border-width, 3px) solid var(--ball-border-color, #403631);
  animation: float 3s ease-in-out infinite;
  transition: transform 0.1s;
}
.pokeball:active { transform: scale(0.93) !important; animation: none; }

.pokeball .top    { position:absolute; top:0; left:0; width:100%; height:50%; background:var(--ball-top,#e63946); }
.pokeball .bottom { position:absolute; bottom:0; left:0; width:100%; height:50%; background:var(--ball-bottom,#f0ede8); }
.pokeball .band   { position:absolute; top:50%; left:0; transform:translateY(-50%); width:100%; height:var(--ball-band-height,10px); background:var(--ball-border-color,#403631); }
.pokeball .btn    { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:var(--ball-btn-size,32px); height:var(--ball-btn-size,32px); border-radius:50%; background:#ffffff; border:var(--ball-border-width,3px) solid var(--ball-border-color,#403631); z-index:2; }
.pokeball .btn::after { content:''; position:absolute; inset:5px; border-radius:50%; background:#ebebeb; }

@keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }

.tap-hint {
  letter-spacing: 0.12em;
  text-transform: uppercase;
  opacity: 0.75;
  animation: blink 2s ease infinite;
}
@keyframes blink { 0%,100%{opacity:0.85;} 50%{opacity:0.4;} }

.flash { position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:100; transition:opacity 0.08s; }
.flash.go { opacity:0.8; }

.card-flip {
  width: 100%;
  perspective: 900px;
  opacity: 0;
  pointer-events: none;
  position: absolute;
}
.card-flip.visible {
  opacity: 1;
  pointer-events: auto;
  position: relative;
}
.card-inner {
  width: 100%;
  transform-style: preserve-3d;
  transform: rotateY(180deg);
}

.card-face {
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  width: 100%;
  border-radius: var(--card-radius, 16px);
  background: var(--card-bg, #fdf8f2);
  border: var(--card-border-outer-width, 3px) solid var(--card-border-outer, #d4af37);
  box-shadow: inset 0 0 0 var(--card-border-inner-width, 2px) var(--card-border-inner, #7a5c00);
  overflow: hidden;
  position: relative;
}

.card-face::after {
  content: '';
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.012) 2px,
    rgba(0,0,0,0.012) 4px
  );
  pointer-events: none;
  z-index: 3;
  border-radius: var(--card-radius, 16px);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.5rem 0.85rem 0.35rem;
  border-bottom: 1px solid rgba(0,0,0,0.08);
}
.card-name { letter-spacing:0.05em; color:var(--card-border-outer,#d4af37); }
.card-hp   { letter-spacing:0.06em; opacity:0.45; }

.card-image-wrap {
  margin: 0.45rem 0.65rem;
  border-radius: calc(var(--card-radius,16px) - 5px);
  overflow: hidden;
  position: relative;
  aspect-ratio: var(--img-ratio, 4/3);
  border: 2px solid var(--card-border-outer, #d4af37);
}
.card-image-wrap img { width:100%; height:100%; object-fit:cover; display:block; }

.card-tag {
  position: absolute;
  top: 9px; right: 9px;
  font-size: var(--tag-size, 0.56rem);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 999px;
  background: var(--tag-bg, rgba(0,0,0,0.5));
  color: var(--tag-color, #fff);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 2;
}

.card-body { padding: 0.55rem 0.85rem 0.85rem; }
.card-divider { width:100%; height:1px; background:rgba(0,0,0,0.08); margin-bottom:0.55rem; }

.card-caption {
  line-height: 1.55;
  margin-bottom: 0.5rem;
  color: var(--card-text, #1a1a1a);
}
.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--card-text-muted, #888);
  letter-spacing: 0.05em;
}

.card-back {
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  border-radius: var(--card-radius, 16px);
  transform: rotateY(180deg);
  border: var(--card-border-outer-width, 3px) solid var(--card-border-outer, #d4af37);
  box-shadow: inset 0 0 0 var(--card-border-inner-width, 2px) var(--card-border-inner, #7a5c00);
  overflow: hidden;
}
.card-back-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
}
.card-back-pattern {
  position: absolute; inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--card-bg, #fdf8f2);
}
.card-back-pattern-inner {
  width: calc(100% - 20px);
  height: calc(100% - 20px);
  border-radius: calc(var(--card-radius,16px) - 4px);
  border: 1px solid rgba(212,175,55,0.3);
  background-image:

.card-back-logo {
  font-size: 1.4rem;
  opacity: 0.18;
  letter-spacing: 0.12em;
  color: var(--card-border-outer, #d4af37);
}
</style>

document.body.style.fontFamily = bFont;

function styled(id, font, size, weight) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.fontFamily = font;
  if (size)   el.style.fontSize   = size;
  if (weight) el.style.fontWeight = weight;
}

styled('site-name',    hFont, D.siteNameSize,  D.headingWeight);
styled('short-date',   bFont, D.dateSize,      D.bodyWeight);
styled('tap-hint',     bFont, D.tapHintSize,   D.bodyWeight);
styled('card-name',    hFont, D.cardNameSize,  D.headingWeight);
styled('card-hp',      bFont, D.cardHpSize,    D.bodyWeight);
styled('card-caption', hFont, D.captionSize,   D.headingWeight);
styled('long-date',    bFont, D.dateSize,      D.bodyWeight);
styled('card-number',  bFont, D.dateSize,      D.bodyWeight);
styled('card-tag',     hFont, D.tagSize,       D.headingWeight);
styled('back-logo',    hFont, null,            D.headingWeight);

document.getElementById('site-name').textContent = D.siteName;
document.getElementById('tap-hint').textContent  = D.tapHint;
document.getElementById('card-name').textContent = D.cardName;
document.getElementById('card-hp').textContent   = D.showHp ? D.hpValue : '';
document.getElementById('back-logo').textContent = D.backLogoText;

const today = new Date();
document.getElementById('short-date').textContent =
  today.toLocaleDateString('en-US', { month:'short', day:'numeric' }).toUpperCase();
document.getElementById('long-date').textContent =
  today.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });

/* ── starts at card 1 on April 25 2026, increments every day ── */
const START_DATE = new Date(2026, 3, 26); // month is 0-indexed, 3 = April
const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());
const dayIndex   = Math.max(0, Math.floor((todayMidnight - START_DATE) / 86400000));
const entryIndex = dayIndex % entries.length;
const entry      = entries[entryIndex];

document.getElementById('card-img').src = entry.image;
document.getElementById('card-img').alt = entry.label || '';
document.getElementById('card-caption').textContent = entry.caption;

if (D.showCardNumber)
  document.getElementById('card-number').textContent =
    `No. ${String(entryIndex + 1).padStart(3,'0')} / ${entries.length}`;

const tagEl = document.getElementById('card-tag');
if (D.showTag && entry.label) tagEl.textContent = entry.label;
else tagEl.style.display = 'none';

const backImg     = document.getElementById('card-back-img');
const backPattern = document.getElementById('card-back-pattern');
if (D.cardBackImage) {
  backImg.src               = D.cardBackImage;
  backImg.style.display     = 'block';
  backPattern.style.display = 'none';
} else {
  backImg.style.display     = 'none';
  backPattern.style.display = 'flex';
}

const animStage = document.getElementById('anim-stage');
const cardFlip  = document.getElementById('card-flip');
const cardInner = document.getElementById('card-inner');
const topbar    = document.getElementById('topbar');
const flash     = document.getElementById('flash');
let opened = false;

document.getElementById('pokeball').addEventListener('click', () => {
  if (opened) return;
  opened = true;

  flash.classList.add('go');
  setTimeout(() => flash.classList.remove('go'), 120);

  setTimeout(() => {
    animStage.classList.add('out');
    setTimeout(() => {
      animStage.style.visibility = 'hidden';
      cardFlip.classList.add('visible');
      topbar.classList.add('visible');
      requestAnimationFrame(() => requestAnimationFrame(() => {
        cardInner.style.transition = 'transform 0.75s cubic-bezier(0.4, 0.0, 0.2, 1)';
        cardInner.style.transform  = 'rotateY(0deg)';
      }));
    }, 360);
  }, 100);
});
</script>
</body>
</html>
