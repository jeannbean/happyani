<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Daily</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&family=Space+Grotesk:wght@400;600&family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;600;800&family=Unbounded:wght@400;700&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.2rem;transition:background .2s;}
.topbar{width:100%;max-width:440px;display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.card{width:100%;max-width:440px;overflow:hidden;}
.img-wrap{position:relative;width:100%;overflow:hidden;}
.img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 6s ease;}
.img-wrap:hover img{transform:scale(1.04);}
.tag{position:absolute;top:12px;left:12px;font-size:0.62rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:5px 11px;}
.card-body{padding:1.1rem 0.1rem 0;}
.caption{line-height:1.35;margin-bottom:0.7rem;}
.meta-date{letter-spacing:0.03em;}
@keyframes rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.card{animation:rise .5s cubic-bezier(.22,1,.36,1) both;}
</style>
</head>
<body>

<div class="topbar">
  <span id="site-name"></span>
  <span id="short-date"></span>
</div>

<div class="card">
  <div class="img-wrap" id="img-wrap">
    <img id="img" src="" alt=""/>
    <span class="tag" id="tag"></span>
  </div>
  <div class="card-body">
    <p class="caption" id="caption"></p>
    <span class="meta-date" id="long-date"></span>
  </div>
</div>

<script>
/* ================================================================
   🎨  YOUR DESIGN SETTINGS — edit anything here
   ================================================================ */
const DESIGN = {

  /* --- Page --- */
  background:       "#f0eeea",   // page background color
  siteName:         "Daily",     // text in top-left corner
  showSiteName:     true,        // show/hide site name
  showDate:         true,        // show/hide the date top-right

  /* --- Card --- */
  cardBackground:   "transparent", // behind the text area (hex or "transparent")
  cardRadius:       "20px",      // corner roundness of the whole card
  imageAspectRatio: "1/1",       // "1/1" = square, "4/3", "16/9", "3/4" = portrait
  imageRadius:      "16px",      // corner roundness of the image

  /* --- Tag badge --- */
  showTag:          true,
  tagBackground:    "#111111",
  tagColor:         "#ffffff",
  tagRadius:        "100px",     // pill = "100px", square = "6px"

  /* --- Caption text --- */
  captionSize:      "1.25rem",   // e.g. "1.1rem", "1.4rem", "clamp(1rem,5vw,1.4rem)"
  captionWeight:    "700",       // "400" light, "600" medium, "700" bold
  captionColor:     "#111010",
  captionAlign:     "left",      // "left", "center", "right"
  captionStyle:     "normal",    // "normal" or "italic"

  /* --- Date line --- */
  dateSize:         "0.68rem",
  dateColor:        "#999999",
  dateAlign:        "left",

  /* --- Site name (top-left) --- */
  siteNameSize:     "1rem",
  siteNameWeight:   "700",
  siteNameColor:    "#111010",

  /* --- Font ---
       Options: 'Syne', 'DM Sans', 'Space Grotesk', 'Outfit',
                'Plus Jakarta Sans', 'Unbounded', 'Instrument Serif'
  ----------------------------------------------------------- */
  fontHeading:      "Syne",         // used for site name + caption
  fontBody:         "DM Sans",      // used for tag + date

  /* --- Spacing --- */
  cardMaxWidth:     "440px",     // max card width
  captionTopPad:    "1.1rem",    // gap between image and caption
};
/* ================================================================
   ✏️  YOUR ENTRIES — add images + captions here
   ================================================================
   image   → relative path like "photos/sunset.jpg" OR a full URL
   caption → text shown below the image
   label   → small badge on the image (leave "" to hide)
   ================================================================ */
const entries = [
  {
    image:   "https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=900",
    caption: "Stillness is not the absence of movement.",
    label:   "Nature"
  },
  {
    image:   "https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?w=900",
    caption: "Every wildflower is a small act of defiance.",
    label:   "Field"
  },
  {
    image:   "https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=900",
    caption: "Walk slowly enough to notice what the hurried world misses.",
    label:   "Wander"
  },
  {
    image:   "https://images.unsplash.com/photo-1519125323398-675f0ddb6308?w=900",
    caption: "Light doesn't ask permission before entering a room.",
    label:   "Morning"
  },
  {
    image:   "https://images.unsplash.com/photo-1444723121867-7a241cacace9?w=900",
    caption: "Cities are just forests rearranged by ambition.",
    label:   "Urban"
  },
  {
    image:   "https://images.unsplash.com/photo-1490750967868-88df5691cc27?w=900",
    caption: "Bloom not for applause — bloom because that's what you do.",
    label:   "Bloom"
  },
  {
    image:   "https://images.unsplash.com/photo-1462275646964-a0e3386b89fa?w=900",
    caption: "The fog doesn't hide the mountain. It reminds you it's still there.",
    label:   "Vista"
  },
];
/* ================================================================
   (nothing below needs to be changed)
   ================================================================ */

/* Apply design */
const d = DESIGN;
document.body.style.background    = d.background;
document.body.style.fontFamily    = `'${d.fontBody}', sans-serif`;

document.querySelector('.card').style.maxWidth = d.cardMaxWidth;
document.querySelector('.topbar').style.maxWidth = d.cardMaxWidth;

const imgWrap = document.getElementById('img-wrap');
imgWrap.style.aspectRatio  = d.imageAspectRatio;
imgWrap.style.borderRadius = d.imageRadius;

document.querySelector('.card-body').style.background    = d.cardBackground;
document.querySelector('.card-body').style.paddingTop    = d.captionTopPad;

const capEl = document.getElementById('caption');
capEl.style.fontSize   = d.captionSize;
capEl.style.fontWeight = d.captionWeight;
capEl.style.color      = d.captionColor;
capEl.style.textAlign  = d.captionAlign;
capEl.style.fontStyle  = d.captionStyle;
capEl.style.fontFamily = `'${d.fontHeading}', sans-serif`;

const dateEl = document.getElementById('long-date');
dateEl.style.fontSize  = d.dateSize;
dateEl.style.color     = d.dateColor;
dateEl.style.display   = 'block';
dateEl.style.textAlign = d.dateAlign;

const nameEl = document.getElementById('site-name');
nameEl.style.fontFamily = `'${d.fontHeading}', sans-serif`;
nameEl.style.fontSize   = d.siteNameSize;
nameEl.style.fontWeight = d.siteNameWeight;
nameEl.style.color      = d.siteNameColor;

const tagEl = document.getElementById('tag');
tagEl.style.background   = d.tagBackground;
tagEl.style.color        = d.tagColor;
tagEl.style.borderRadius = d.tagRadius;
tagEl.style.fontFamily   = `'${d.fontBody}', sans-serif`;

/* Date */
const today = new Date();
if (d.showDate)
  document.getElementById('short-date').textContent =
    today.toLocaleDateString('en-US',{month:'short',day:'numeric'}).toUpperCase();
if (d.showSiteName)
  nameEl.textContent = d.siteName;

/* Seeded daily pick */
const day = Math.floor((today - new Date(today.getFullYear(),0,0)) / 86400000);
function seeded(s){ return ()=>{ s=(s*1664525+1013904223)&0xffffffff; return (s>>>0)/0xffffffff; }; }
const rand = seeded(day * 2654435761);
const pool = [...entries];
for(let i=pool.length-1;i>0;i--){ const j=Math.floor(rand()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
const entry = pool[day % pool.length];

document.getElementById('img').src = entry.image;
document.getElementById('img').alt = entry.label || '';
capEl.textContent = entry.caption;
dateEl.textContent = today.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

if (entry.label && d.showTag) tagEl.textContent = entry.label;
else tagEl.style.display = 'none';
</script>
</body>
</html>
